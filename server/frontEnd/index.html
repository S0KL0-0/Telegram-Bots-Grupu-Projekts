<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timetables</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    <style>


        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #252525;
        }
        select {
            margin-bottom: 16px;
            padding: 4px 8px;
            font-size: 14px;
        }

        label {
            font-weight: bold;
            margin-right: 8px; }


        table {
            border-collapse: collapse;
            margin-bottom: 24px;
            background-color: #ffffff;
        }

        th, td { border: 1px solid #ccc;
            padding: 4px 6px; font-size: 12px;
            text-align: center; min-width: 80px;
            vertical-align: middle;
            background-color: #ffffff;
        }

        .week-title {
            margin: 12px 0 4px;
            font-weight: bold;
            color: white;
        }


        #loadMore {
            display: none;
            margin: 12px 0 24px;
            padding: 8px 24px;
            font-size: 14px;
            cursor: pointer;
            background-color: #b80b0b;
            border: none;
            color: white;
            border-radius: 4px;
            min-height: 2vh;
            min-width: 2vh;
            max-height: 6vh;
            max-width: 16vh;
            font-family: Lexend, serif;
        }
        #loadMore:disabled {
            opacity: 0.5;
            cursor: wait;
        }
        nav {
            background-color: #ed2323;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            color: white;
            font-family: Lexend, serif;
        }
        nav label {
            font-family: Lexend, serif;
        }

        #output {
            max-width: 1200px;
            margin: 0 auto;
        }

        #ShortDay {
            background-color: #b80b0b;
            border: none;
            color: white;
            border-radius: 4px;
            padding: 10px;
            min-height: 2vh;
            min-width: 2vh;
            max-height: 6vh;
            max-width: 16vh;
            font-family: Lexend, serif;
        }

        #somebutton {
            background-color: #b80b0b;
            border: none;
            color: white;
            border-radius: 4px;
            padding: 10px;
            min-height: 2vh;
            min-width: 2vh;
            max-height: 6vh;
            max-width: 16vh;
            font-family: Lexend, serif;
        }
    </style>
</head>
<body>

    <nav>
        <button id="ShortDay">Saīsinātā diena</button>|
        <button id="somebutton">Click Me!</button>|
        <label for="groupSelect">Group:</label>
        <select id="groupSelect"><option>Loading...</option></select>|
    </nav>

    <div id="output"></div>
    <button id="loadMore">Load more</button>

    <script src="timetable.js"> </script>
</body>
</html>
